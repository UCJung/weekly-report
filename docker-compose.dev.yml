name: uc-teamspace-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: uc_teamspace
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d uc_teamspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: development
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://dev:dev1234@postgres:5432/uc_teamspace
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-uc-teamspace-2026
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend/src:/app/packages/frontend/src

volumes:
  pgdata:
