name: uc-teamspace-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: uc_teamspace
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev1234
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d uc_teamspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
